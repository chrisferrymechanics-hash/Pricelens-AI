name: Upload Binary to App Store Connect

on:
  workflow_dispatch:
    inputs:
      ipa_url:
        description: 'Direct URL to the .ipa file to upload'
        required: true
        type: string

jobs:
  upload-to-appstore:
    name: Upload IPA via xcrun altool
    runs-on: macos-latest

    steps:
      - name: Download IPA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IPA_URL="${{ github.event.inputs.ipa_url }}"
          echo "Downloading IPA from: $IPA_URL"

          # If it's a GitHub artifact URL, extract the artifact ID and use the API
          if [[ "$IPA_URL" =~ /actions/runs/[0-9]+/artifacts/([0-9]+) ]]; then
            ARTIFACT_ID="${BASH_REMATCH[1]}"
            REPO="${{ github.repository }}"
            echo "Detected GitHub artifact ID: $ARTIFACT_ID"
            gh api "/repos/$REPO/actions/artifacts/$ARTIFACT_ID/zip" > artifact.zip
            unzip -o artifact.zip "*.ipa" || unzip -o artifact.zip
            IPA_FILE=$(find . -name "*.ipa" | head -1)
            if [ -z "$IPA_FILE" ]; then
              echo "ERROR: No .ipa file found in artifact zip"
              exit 1
            fi
            mv "$IPA_FILE" app.ipa
          else
            # Direct URL — plain curl, no auth header
            HTTP_STATUS=$(curl -L -w "%{http_code}" -o app.ipa "$IPA_URL")
            echo "HTTP status: $HTTP_STATUS"
            if [ "$HTTP_STATUS" != "200" ]; then
              echo "ERROR: Failed to download IPA. HTTP status $HTTP_STATUS"
              echo "Ensure the URL is a publicly accessible direct download link to a .ipa file."
              exit 1
            fi
          fi
          ls -lh app.ipa

      - name: Write API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Upload to App Store Connect
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file app.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --output-format json

      - name: Clean up
        if: always()
        run: |
          rm -f app.ipa
          rm -f ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
